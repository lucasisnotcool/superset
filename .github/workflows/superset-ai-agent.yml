# Runs the standalone AI agent unit suite with the AI-agent requirements
# installed. Because `wren-core-py` is a hard dependency there, the semantic
# engine is *present* in this job, so the wren-core-gated rewrite/deep-validation
# tests (skipped locally when the wheel is absent) actually execute here. This is
# the engine-parity gating job (wren_full.md RE1).
name: AI Agent Unit Tests

on:
  push:
    branches:
      - "master"
      - "[0-9].[0-9]*"
    paths:
      - "superset_ai_agent/**"
      - "tests/unit_tests/superset_ai_agent/**"
      - "requirements-ai-agent.txt"
      - ".github/workflows/superset-ai-agent.yml"
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "superset_ai_agent/**"
      - "tests/unit_tests/superset_ai_agent/**"
      - "requirements-ai-agent.txt"
      - ".github/workflows/superset-ai-agent.yml"

permissions:
  contents: read

# cancel previous workflow jobs for PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test-ai-agent:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Python
        uses: ./.github/actions/setup-backend/
        with:
          python-version: current
          requirements-type: dev

      - name: Install AI agent requirements (includes wren-core)
        run: uv pip install --system -r requirements-ai-agent.txt

      - name: Assert wren-core is importable
        # Guards the gating contract: if the wheel ever fails to install, the
        # engine-present tests would silently skip instead of running. Fail loud.
        run: python -c "import wren_core; print('wren-core present')"

      - name: Assert engine-gated tests actually run (no silent skip)
        # The prior step guarantees wren-core is available, so every test marked
        # `requires_wren_core` MUST run here. `--strict-markers` rejects a typo'd
        # marker; `-W error::pytest.PytestUnknownMarkWarning` is redundant insurance.
        # If any of these tests skip (e.g. a refactor drops the marker or breaks
        # `wren_core_available()`), the engine contract is silently unverified —
        # fail the job instead. (wren_full.md F1.)
        run: |
          pytest tests/unit_tests/superset_ai_agent -m requires_wren_core \
            --strict-markers -rs -q --tb=short | tee gated.txt
          # pytest only prints "skipped" in the summary when the count is > 0.
          if grep -qi "skipped" gated.txt; then
            echo "::error::wren-core-gated tests were skipped despite the engine being present"; exit 1
          fi
          if ! grep -qE "[1-9][0-9]* passed" gated.txt; then
            echo "::error::no wren-core-gated tests ran (marker missing?)"; exit 1
          fi

      - name: Run AI agent unit tests
        run: pytest tests/unit_tests/superset_ai_agent -q --tb=short --strict-markers
