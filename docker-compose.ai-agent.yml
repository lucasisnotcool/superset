services:
  superset-ai-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-agent
    env_file:
      - path: superset_ai_agent/.env
        required: true
    environment:
      SUPERSET_BASE_URL: http://superset:8088
      SUPERSET_MCP_URL: http://superset-mcp:8098/mcp
    ports:
      - "127.0.0.1:${AI_AGENT_HOST_PORT:-8097}:5050"
    depends_on:
      superset:
        condition: service_started
    restart: unless-stopped

  superset-node:
    environment:
      SUPERSET_AI_AGENT_URL: /ai-agent
      SUPERSET_AI_AGENT_PROXY: http://superset-ai-agent:5050
    depends_on:
      superset-ai-agent:
        condition: service_started

  nginx:
    environment:
      SUPERSET_AI_AGENT_UPSTREAM: superset-ai-agent:5050
    depends_on:
      superset-ai-agent:
        condition: service_started
